info:
  name: List users
  type: http
  seq: 1

http:
  method: GET
  url: "{{host}}/users?page=1&limit=10"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        const users = Array.isArray(data?.items) ? data.items : data;
        if (Array.isArray(users) && users[0]?.id) {
          bru.setEnvVar("userId", users[0].id, { persist: true });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
