info:
  name: List books
  type: http
  seq: 2

http:
  method: GET
  url: "{{host}}/clubs/{{clubId}}/books?page=1&limit=10"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        const books = Array.isArray(data?.items) ? data.items : data;
        if (Array.isArray(books) && books[0]?.id) {
          bru.setEnvVar("bookId", books[0].id, { persist: true });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
