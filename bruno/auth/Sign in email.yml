info:
  name: Sign in email
  type: http
  seq: 2

http:
  method: POST
  url: "{{host}}/{{baseRoute}}/sign-in/email"
  body:
    type: json
    data: |-
      {
        "email": "{{currentUserEmail}}",
        "password": "azertyuiop",
        "rememberMe": true
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        let data = res.getBody();
        if (data) {
          if (data.user && data.user.email) {
            bru.setEnvVar("currentUserEmail", data.user.email, { persist: true })
          }
          
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
