info:
  name: Refresh / access token
  type: http
  seq: 4

http:
  method: GET
  url: "{{host}}/{{baseRoute}}/token"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        let data = res.getBody();
        if (data && data.token) {
          if (data.token) {
            bru.setEnvVar("token", data.token, { persist: true });
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
