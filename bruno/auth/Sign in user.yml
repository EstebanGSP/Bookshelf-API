info:
  name: Sign in user
  type: http
  seq: 2

http:
  method: POST
  url: "{{host}}/auth/sign-in/email"
  body:
    type: json
    data: |-
      {
        "email": "{{currentUserEmail}}",
        "password": "{{userPassword}}",
        "rememberMe": true
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
