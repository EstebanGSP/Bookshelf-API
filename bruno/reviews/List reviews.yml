info:
  name: List reviews
  type: http
  seq: 2

http:
  method: GET
  url: "{{host}}/clubs/{{clubId}}/books/{{bookId}}/reviews"

runtime:
  scripts:
    - type: after-response
      code: |-
        const reviews = res.getBody();
        if (Array.isArray(reviews) && reviews[0]?.id) {
          bru.setEnvVar("reviewId", reviews[0].id, { persist: true });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
