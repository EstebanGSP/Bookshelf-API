info:
  name: Invite member
  type: http
  seq: 2

http:
  method: POST
  url: "{{host}}/clubs/{{clubId}}/members/invitations"
  body:
    type: json
    data: |-
      {
        "email": "bruno-invite-{{$timestamp}}@example.com",
        "role": "READER"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        if (data?.membership?.id) {
          bru.setEnvVar("memberId", data.membership.id, { persist: true });
        }
        if (data?.id) {
          bru.setEnvVar("memberId", data.id, { persist: true });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
