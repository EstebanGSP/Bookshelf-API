info:
  name: List members
  type: http
  seq: 1

http:
  method: GET
  url: "{{host}}/clubs/{{clubId}}/members"

runtime:
  scripts:
    - type: after-response
      code: |-
        const members = res.getBody();
        if (Array.isArray(members)) {
          const editable = members.find((member) => member.role !== "OWNER") ?? members[0];
          if (editable?.id) {
            bru.setEnvVar("memberId", editable.id, { persist: true });
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
